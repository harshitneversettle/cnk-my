jobs:
  run-flight-cron:
    name: Refresh flight_price_cache
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Show public IP
        run: |
          echo "Public IP:"
          curl -s ifconfig.me
          echo

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run flight cron
        working-directory: backend
        run: npm run cron:flights:now
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TRIPJACK_API_KEY: ${{ secrets.TRIPJACK_API_KEY }}
          TRIPJACK_BASE_URL: ${{ secrets.TRIPJACK_BASE_URL }}
